name: Build ONNX Runtime QNN Wheel for Android

on: 
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ONNX Runtime
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cmake ninja setuptools wheel flatbuffers

      - name: Setup Android NDK
        # Dynamically finds the latest Android NDK installed on the GitHub runner
        run: |
          LATEST_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/* | sort -V | tail -n 1)
          echo "ANDROID_NDK_PATH=$LATEST_NDK" >> $GITHUB_ENV
          echo "Using Android NDK at: $LATEST_NDK"

      - name: Fetch Qualcomm QNN SDK
        run: |
          echo "Downloading Qualcomm QNN SDK v2.39..."
          curl -L "https://apigwx-aws.qualcomm.com/qsc/public/v1/api/download/software/sdks/Qualcomm_AI_Runtime_Community/All/2.39.0.250926/v2.39.0.250926.zip" -o qnn_sdk.zip
          
          echo "Extracting SDK..."
          mkdir -p /tmp/qnn_extracted
          unzip -q qnn_sdk.zip -d /tmp/qnn_extracted
          
          echo "Locating QNN SDK root directory..."
          # Recursively find the key header file required by ONNX Runtime
          HEADER_PATH=$(find /tmp/qnn_extracted -type f -name "QnnInterface.h" | head -n 1)
          
          if [ -z "$HEADER_PATH" ]; then
            echo "::error::Could not find QnnInterface.h inside the extracted SDK archive!"
            exit 1
          fi
          
          # Go up two levels (from 'include/QnnInterface.h' back to the SDK root folder)
          QNN_ROOT=$(dirname $(dirname "$HEADER_PATH"))
          
          echo "QNN_HOME=$QNN_ROOT" >> $GITHUB_ENV
          echo "Detected QNN Home path at: $QNN_ROOT"

      - name: Build the Python Wheel
        run: |
          ./build.sh \
            --config Release \
            --android \
            --android_sdk_path $ANDROID_SDK_ROOT \
            --android_ndk_path ${{ env.ANDROID_NDK_PATH }} \
            --android_abi arm64-v8a \
            --android_api 29 \
            --cmake_generator Ninja \
            --build_wheel \
            --parallel 2 \
            --use_qnn static_lib \
            --qnn_home "${{ env.QNN_HOME }}" \
            --use_nnapi \
            --use_xnnpack

      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-android-qnn-wheel
          path: build/Android/Release/dist/*.whl
